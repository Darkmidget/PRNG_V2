[platformio]
default_envs = feather_m4

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
; Note: esp32dev requires a separate ESP32-specific main.cpp without display includes
; Current src/main.cpp is for Feather M4 and includes display libraries not available for ESP32
lib_deps =
  adafruit/Adafruit Fingerprint Sensor Library @ ^2.1.3

[env:feather_m4]
platform = atmelsam
board = adafruit_feather_m4
framework = arduino
build_src_filter = +<*> -<fpga_uart_test.ino> -<fpga_diagnostic.cpp>
upload_port = COM8
monitor_port = COM8
monitor_speed = 115200
monitor_filters = direct
monitor_echo = yes
monitor_dtr = 1
monitor_rts = 1
lib_deps =
  adafruit/Adafruit GFX Library @ ^1.11.5
  adafruit/Adafruit HX8357 Library
  adafruit/Adafruit Fingerprint Sensor Library @ ^2.1.3
